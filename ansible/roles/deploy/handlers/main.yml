---
# =============================================================================
# Handlers: deploy
# =============================================================================
# Pi-hole v6's `pihole reloaddns` does not reliably pick up new entries from
# /etc/dnsmasq.d/*.conf. Full container restart is the reliable way to apply
# changes to split DNS config.
# =============================================================================

- name: Restart pihole
  ansible.builtin.command:
    cmd: docker restart pihole
  changed_when: true

# Traefik reads its static config (entryPoints, ping, ACME) ONLY at startup.
# `docker compose up -d` won't recreate the container when only the mounted
# traefik.yml changes (the compose config hash is unchanged), so a config edit
# never takes effect without an explicit restart.
- name: Restart traefik
  ansible.builtin.command:
    cmd: docker restart traefik
  changed_when: true

---
# =============================================================================
# Role: deploy — Deploy Docker Compose stacks
# =============================================================================
# All secrets must be set in host_vars/homelab/local.yml (gitignored)
# or passed via --extra-vars.
# =============================================================================

# --- Host facts ---

- name: Lookup UID/GID of ansible_user
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"

# --- Hash WireGuard password (wg-easy needs bcrypt) ---

- name: Install python3-bcrypt on Pi
  ansible.builtin.apt:
    name: python3-bcrypt
    state: present

- name: Generate WireGuard bcrypt hash
  ansible.builtin.command:
    cmd: python3 -c "import sys, bcrypt; pwd = sys.stdin.buffer.readline().rstrip(b'\n'); print(bcrypt.hashpw(pwd, bcrypt.gensalt()).decode())"
    stdin: "{{ wg_password }}"
  register: wg_hash_result
  changed_when: false
  no_log: true

- name: Set WireGuard password hash fact
  ansible.builtin.set_fact:
    wg_password_hash: "{{ wg_hash_result.stdout }}"

# --- Hash Vaultwarden admin token (Argon2id, deterministic via fixed salt) ---

- name: Install python3-argon2 on Pi
  ansible.builtin.apt:
    name: python3-argon2
    state: present

- name: Generate Vaultwarden Argon2 hash (deterministic)
  ansible.builtin.command:
    cmd: python3 -c "import os,sys; from argon2.low_level import hash_secret, Type; print(hash_secret(os.environ['T'].encode(), bytes.fromhex(os.environ['S']), time_cost=3, memory_cost=65540, parallelism=4, hash_len=32, type=Type.ID).decode())"
  environment:
    T: "{{ vaultwarden_admin_token }}"
    S: "{{ vaultwarden_admin_salt }}"
  register: vw_hash
  no_log: true
  changed_when: false

- name: Set Vaultwarden Argon2 hash fact
  ansible.builtin.set_fact:
    vaultwarden_admin_token_hash: "{{ vw_hash.stdout }}"
  no_log: true

# --- Deploy ---

- name: Create deployment directory
  ansible.builtin.file:
    path: /opt/homelab
    state: directory
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0750"

- name: Copy Docker Compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../docker/compose.yaml"
    dest: /opt/homelab/compose.yaml
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0640"

- name: Template environment file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/homelab/.env
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0600"

- name: Copy service configurations
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../docker/configs/"
    dest: /opt/homelab/configs/
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0640"
    directory_mode: "0750"

- name: Template Traefik static config (resolve variables)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../docker/configs/traefik/traefik.yml"
    dest: /opt/homelab/configs/traefik/traefik.yml
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0640"

- name: Template Pi-hole split DNS config (resolve variables)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../docker/configs/pihole/05-homelab.conf"
    dest: /opt/homelab/configs/pihole/05-homelab.conf
    owner: "{{ ansible_user }}"
    group: docker
    mode: "0640"
  notify: Restart pihole

- name: Ensure Docker networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop:
    - proxy
    - internal

- name: Pull latest images
  ansible.builtin.command:
    cmd: docker compose pull {{ deploy_services | default('') }}
    chdir: /opt/homelab
  changed_when: false

- name: Deploy services
  ansible.builtin.command:
    cmd: docker compose up -d {{ deploy_services | default('') }}
    chdir: /opt/homelab
  register: compose_result
  changed_when: "'Started' in compose_result.stderr or 'Created' in compose_result.stderr"

- name: Show deployment output
  ansible.builtin.debug:
    var: compose_result.stderr_lines

# --- Pi-hole password (v6 ignores env var after first start) ---

- name: Check if Pi-hole is running
  ansible.builtin.command:
    cmd: docker ps -q -f name=pihole -f status=running
  register: pihole_running
  changed_when: false

- name: Set Pi-hole admin password
  ansible.builtin.shell:
    cmd: "docker exec pihole pihole setpassword {{ pihole_password | quote }}"
  no_log: true
  changed_when: true
  when: pihole_running.stdout | length > 0

# --- Nextcloud post-config (cron mode, system settings, apps) ---

- name: Check if Nextcloud is running
  ansible.builtin.command:
    cmd: docker ps -q -f name=nextcloud -f status=running
  register: nextcloud_running
  changed_when: false

- name: Wait for Nextcloud to be ready
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ status --output=json
  register: nc_status
  until: nc_status.rc == 0 and (nc_status.stdout | from_json).installed | default(false)
  retries: 30
  delay: 5
  changed_when: false
  when: nextcloud_running.stdout | length > 0

- name: Set Nextcloud background jobs to cron mode
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ background:cron
  register: nc_cron
  changed_when: "'set to cron' in nc_cron.stdout"
  when: nextcloud_running.stdout | length > 0

- name: Configure Nextcloud system settings
  ansible.builtin.command:
    cmd: "docker exec -u www-data nextcloud php occ config:system:set {{ item.key }} --type={{ item.type }} --value={{ item.value }}"
  loop:
    - { key: default_phone_region, type: string, value: FR }
    - { key: maintenance_window_start, type: integer, value: "4" }
  changed_when: true
  when: nextcloud_running.stdout | length > 0

# Manage trusted_domains via occ: NEXTCLOUD_TRUSTED_DOMAINS only applies on first
# install, not on an existing instance. localhost = internal healthcheck,
# nextcloud = notify_push reaching http://nextcloud, drive.<domain> = real access.
- name: Ensure Nextcloud trusted domains
  ansible.builtin.command:
    cmd: "docker exec -u www-data nextcloud php occ config:system:set trusted_domains {{ item.idx }} --value={{ item.val }}"
  loop:
    - { idx: 0, val: localhost }
    - { idx: 1, val: "drive.{{ domain }}" }
    - { idx: 2, val: nextcloud }
  loop_control:
    label: "{{ item.val }}"
  changed_when: true
  when: nextcloud_running.stdout | length > 0

- name: Get installed Nextcloud apps
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ app:list --output=json
  register: nc_app_list
  changed_when: false
  when: nextcloud_running.stdout | length > 0

- name: Install Nextcloud productivity apps
  ansible.builtin.command:
    cmd: "docker exec -u www-data nextcloud php occ app:install {{ item }}"
  loop: [calendar, contacts, tasks, bookmarks, gpxpod, external, notify_push]
  when:
    - nextcloud_running.stdout | length > 0
    - item not in (nc_app_list.stdout | default('{}') | from_json).enabled
    - item not in (nc_app_list.stdout | default('{}') | from_json).disabled
  register: nc_app_install
  changed_when: nc_app_install.rc == 0
  failed_when:
    - nc_app_install.rc is defined
    - nc_app_install.rc != 0
    - "'not compatible' not in nc_app_install.stdout"

# notify_push reads config.php (trusted_proxies, binary path) at startup, so it
# must be restarted after the app is installed and after any Nextcloud config
# change for the self-test to pass.
- name: Restart notify_push to reload Nextcloud config
  ansible.builtin.command:
    cmd: docker restart nextcloud-notify-push
  changed_when: true
  when: nextcloud_running.stdout | length > 0

- name: Set up notify_push (client real-time updates)
  ansible.builtin.command:
    cmd: "docker exec -u www-data nextcloud php occ notify_push:setup https://drive.{{ domain }}/push"
  register: nc_notify_push
  until: nc_notify_push.rc == 0
  retries: 6
  delay: 10
  changed_when: "'configuration saved' in nc_notify_push.stdout or 'success' in nc_notify_push.stdout"
  failed_when: false
  when: nextcloud_running.stdout | length > 0

# Mount media libraries (photos/music/videos) as read-only External Storage
# so Nextcloud can browse them without duplicating players or syncing files.

- name: Ensure files_external app is enabled
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ app:enable files_external
  register: nc_files_external
  changed_when: "'already enabled' not in nc_files_external.stdout"
  when: nextcloud_running.stdout | length > 0

- name: List existing Nextcloud external storages
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ files_external:list --output=json
  register: nc_ext_list
  changed_when: false
  when: nextcloud_running.stdout | length > 0

- name: Create media external storages
  ansible.builtin.command:
    cmd: >
      docker exec -u www-data nextcloud php occ files_external:create
      "{{ item.name }}" local null::null -c datadir={{ item.path }}
  loop:
    - { name: Photos, path: /external/photos }
    - { name: Music, path: /external/music }
    - { name: Videos, path: /external/videos }
  when:
    - nextcloud_running.stdout | length > 0
    - item.path not in (nc_ext_list.stdout | default('[]') | from_json | map(attribute='configuration.datadir') | list)
  changed_when: true

- name: Re-list external storages after creation
  ansible.builtin.command:
    cmd: docker exec -u www-data nextcloud php occ files_external:list --output=json
  register: nc_ext_list2
  changed_when: false
  when: nextcloud_running.stdout | length > 0

- name: Enforce read-only on media external storages
  ansible.builtin.command:
    cmd: >
      docker exec -u www-data nextcloud php occ files_external:option
      {{ item.mount_id }} readonly true
  loop: "{{ (nc_ext_list2.stdout | from_json) if (nc_ext_list2.stdout | default('')) else [] }}"
  loop_control:
    label: "{{ item.mount_point | default('?') }}"
  when:
    - nextcloud_running.stdout | length > 0
    - item.configuration.datadir is defined
    - item.configuration.datadir.startswith('/external/')
  changed_when: false

# --- Backup setup ---

- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present

- name: Create scripts directory
  ansible.builtin.file:
    path: /opt/homelab/scripts
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Copy backup script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/backup.sh"
    dest: /opt/homelab/scripts/backup.sh
    owner: root
    group: root
    mode: "0750"

- name: Template backup environment file
  ansible.builtin.template:
    src: backup.env.j2
    dest: /opt/homelab/backup.env
    owner: root
    group: root
    mode: "0600"

- name: Initialize restic repository
  ansible.builtin.command:
    cmd: restic init
  environment:
    RESTIC_REPOSITORY: "{{ backup_dir }}/restic-repo"
    RESTIC_PASSWORD: "{{ restic_password }}"
  register: restic_init
  failed_when: false
  changed_when: "'created restic repository' in restic_init.stdout"

# HOME is unset for systemd services, so restic can't locate its cache
# ("neither $XDG_CACHE_HOME nor $HOME are defined") and runs cache-less — slower
# and re-reads more from the repo. Set HOME so it caches under /root/.cache/restic.
- name: Create backup systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/homelab-backup.service
    mode: "0644"
    content: |
      [Unit]
      Description=Home Lab Restic Backup
      Requires=mnt-data.mount
      After=mnt-data.mount

      [Service]
      Type=oneshot
      ExecStart=/opt/homelab/scripts/backup.sh
      EnvironmentFile=/opt/homelab/backup.env
      Environment=HOME=/root

- name: Create backup systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/homelab-backup.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Daily Home Lab Backup at 3 AM

      [Timer]
      OnCalendar=*-*-* 03:00:00
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Enable backup timer
  ansible.builtin.systemd:
    name: homelab-backup.timer
    enabled: true
    state: started
    daemon_reload: true

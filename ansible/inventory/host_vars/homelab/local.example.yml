# =============================================================================
# Local overrides — Copy to local.yml and fill in real values
# =============================================================================
# cp local.example.yml local.yml
# local.yml is gitignored — secrets stay local.
# Generate passwords in your password manager.
# =============================================================================

# --- Connection ---
ansible_user: pi
domain: example.com

# --- Storage ---
luks_passphrase: ""  # Used once for initial LUKS format, needed for re-provisioning

# --- Traefik ---
traefik_acme_email: "admin@example.com"

# --- Pi-hole ---
pihole_password: ""

# --- WireGuard ---
wg_password: ""  # Max 72 chars (bcrypt limit), will be hashed by Ansible

# --- Nextcloud ---
nextcloud_admin_password: ""
nextcloud_db_password: ""
nextcloud_db_root_password: ""

# --- Vaultwarden ---
vaultwarden_admin_token: ""
# 16+ random bytes in hex (e.g. `openssl rand -hex 16`). Stable salt for
# deterministic Argon2 hashing of the admin token. Keep it secret.
vaultwarden_admin_salt: ""

# --- Immich ---
immich_db_password: ""

# --- Transmission ---
transmission_password: ""

# --- Claude Code (on the Pi) ---
# Auth is manual: `claude auth login` (claude.ai) on the Pi — credentials persist
# in ~/.claude. No token here (inference-only tokens can't do Remote Control).
rclone_webdav_pass: ""  # A Nextcloud app-password for rclone WebDAV access

# --- SearXNG (private metasearch) ---
searxng_secret_key: ""  # openssl rand -hex 32

# --- Backup ---
restic_password: ""
# Uptime Kuma "Push" monitor URL for backup monitoring — base form:
# https://<uptime-kuma>/api/push/<token>  (leave empty to disable monitoring).
# Create the push monitor + attach a notification: see
# knowledge/runbooks/backup-monitoring.md
backup_kuma_push_url: ""

# Split DNS — resolve homelab subdomains to LAN IP
# Ensures VPN clients reach services directly without going through public internet
address=/drive.{{ domain }}/{{ homelab_ip }}
address=/vault.{{ domain }}/{{ homelab_ip }}
address=/videos.{{ domain }}/{{ homelab_ip }}
address=/music.{{ domain }}/{{ homelab_ip }}
address=/photos.{{ domain }}/{{ homelab_ip }}
address=/vpn.{{ domain }}/{{ homelab_ip }}
address=/dns.{{ domain }}/{{ homelab_ip }}
address=/services.{{ domain }}/{{ homelab_ip }}
address=/system.{{ domain }}/{{ homelab_ip }}
address=/share.{{ domain }}/{{ homelab_ip }}

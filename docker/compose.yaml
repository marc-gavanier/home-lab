# =============================================================================
# Home Lab — Docker Compose
# =============================================================================
# All services for the home lab. Deploy with:
#   docker compose up -d
# =============================================================================

networks:
  proxy:
    external: true
  internal:
    driver: bridge

# =============================================================================
# Phase 2 — Network infrastructure
# =============================================================================

services:

  # --- Traefik (Reverse Proxy) ---
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${SERVICES_DATA_DIR}/traefik/acme:/acme
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Pi-hole (DNS + Ad blocking) ---
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: ${TZ}
      FTLCONF_dns_listeningMode: all
      FTLCONF_misc_etc_dnsmasq_d: "true"
    volumes:
      - ${SERVICES_DATA_DIR}/pihole/etc:/etc/pihole
      - ${SERVICES_DATA_DIR}/pihole/dnsmasq:/etc/dnsmasq.d
      - ./configs/pihole/05-homelab.conf:/etc/dnsmasq.d/05-homelab.conf:ro
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`dns.${DOMAIN}`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls.certresolver=letsencrypt"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- WireGuard VPN ---
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821"  # Web UI, localhost only (access via SSH tunnel)
    environment:
      WG_HOST: ${WG_HOST}
      PASSWORD_HASH: ${WG_PASSWORD_HASH}
      WG_DEFAULT_DNS: ${PI_LAN_IP}
      WG_ALLOWED_IPS: 0.0.0.0/0
    volumes:
      - ${SERVICES_DATA_DIR}/wireguard:/etc/wireguard
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wireguard.rule=Host(`vpn.${DOMAIN}`)"
      - "traefik.http.routers.wireguard.entrypoints=websecure"
      - "traefik.http.routers.wireguard.tls.certresolver=letsencrypt"
      - "traefik.http.services.wireguard.loadbalancer.server.port=51821"

# =============================================================================
# Phase 3 — Essential services
# =============================================================================

  # --- Nextcloud ---
  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      # "nextcloud" is needed so the notify_push service can reach NEXTCLOUD_URL=http://nextcloud
      NEXTCLOUD_TRUSTED_DOMAINS: drive.${DOMAIN} nextcloud
      OVERWRITEPROTOCOL: https
      # /12 covers all Docker subnets (Traefik on proxy + notify_push on internal)
      TRUSTED_PROXIES: 172.16.0.0/12
      OVERWRITECLIURL: https://drive.${DOMAIN}
      REDIS_HOST: nextcloud-redis
      NEXTCLOUD_MAINTENANCE_WINDOW_START: "4"
    volumes:
      - ${SERVICES_DATA_DIR}/nextcloud/data:/var/www/html
      # Media libraries mounted read-only for browsing via External Storage
      # (no copy, no sync — Immich/Jellyfin/Navidrome stay the players)
      - ${MEDIA_DIR}/photos:/external/photos:ro
      - ${MEDIA_DIR}/music:/external/music:ro
      - ${MEDIA_DIR}/videos:/external/videos:ro
    # Pin drive.<domain> to the Pi's LAN IP so internal requests (notify_push
    # self-test) reach Traefik over TCP/443 instead of hairpinning to the public
    # IP. (A dns: Pi-hole entry doesn't work here — UDP/53 hairpin to the host
    # fails from this container, while TCP/443 to the LAN IP works.)
    extra_hosts:
      - "drive.${DOMAIN}:${PI_LAN_IP}"
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`drive.${DOMAIN}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-headers@file"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ${SERVICES_DATA_DIR}/nextcloud/db:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 5s
      retries: 3

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Companion container running Nextcloud background jobs every 5 min
  # (system cron, more reliable than AJAX). Shares the data volume.
  nextcloud-cron:
    image: nextcloud:apache
    container_name: nextcloud-cron
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    volumes:
      - ${SERVICES_DATA_DIR}/nextcloud/data:/var/www/html
    networks:
      - internal

  # Real-time update push to sync clients (websocket). Runs the notify_push
  # binary shipped by the app; the until-loop waits for it to be installed.
  nextcloud-notify-push:
    image: nextcloud:apache
    container_name: nextcloud-notify-push
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    environment:
      PORT: "7867"
      NEXTCLOUD_URL: http://nextcloud
    entrypoint:
      - /bin/sh
      - -c
      - "until [ -x /var/www/html/custom_apps/notify_push/bin/aarch64/notify_push ]; do echo 'waiting for notify_push binary'; sleep 5; done; exec /var/www/html/custom_apps/notify_push/bin/aarch64/notify_push /var/www/html/config/config.php"
    volumes:
      - ${SERVICES_DATA_DIR}/nextcloud/data:/var/www/html
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notify-push.rule=Host(`drive.${DOMAIN}`) && PathPrefix(`/push`)"
      - "traefik.http.routers.notify-push.priority=100"
      - "traefik.http.routers.notify-push.entrypoints=websecure"
      - "traefik.http.routers.notify-push.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.notify-push-strip.stripprefix.prefixes=/push"
      - "traefik.http.routers.notify-push.middlewares=notify-push-strip"
      - "traefik.http.services.notify-push.loadbalancer.server.port=7867"

  # --- Vaultwarden ---
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: https://vault.${DOMAIN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN_HASH}
    volumes:
      - ${SERVICES_DATA_DIR}/vaultwarden:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/alive"]
      interval: 30s
      timeout: 5s
      retries: 3

# =============================================================================
# Phase 4 — Secondary services
# =============================================================================

  # --- Jellyfin (Video) ---
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      JELLYFIN_PublishedServerUrl: https://videos.${DOMAIN}
    volumes:
      - ${SERVICES_DATA_DIR}/jellyfin/config:/config
      - ${SERVICES_DATA_DIR}/jellyfin/cache:/cache
      - ${MEDIA_DIR}/videos:/media/videos:ro
      - ${MEDIA_DIR}/music:/media/music:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`videos.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Navidrome (Music) ---
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: ""
    volumes:
      - ${SERVICES_DATA_DIR}/navidrome:/data
      - ${MEDIA_DIR}/music:/music:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.navidrome.rule=Host(`music.${DOMAIN}`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls.certresolver=letsencrypt"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Immich (Photos) ---
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    depends_on:
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_started
    environment:
      DB_HOSTNAME: immich-db
      DB_USERNAME: ${IMMICH_DB_USER}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_NAME}
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ${SERVICES_DATA_DIR}/immich/upload:/usr/src/app/upload
      - ${MEDIA_DIR}/photos:/usr/src/app/external:ro
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`photos.${DOMAIN}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    volumes:
      - ${SERVICES_DATA_DIR}/immich/ml-cache:/cache
    networks:
      - internal

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  immich-db:
    image: tensorchord/pgvecto-rs:pg16-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${IMMICH_DB_USER}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_DB: ${IMMICH_DB_NAME}
    volumes:
      - ${SERVICES_DATA_DIR}/immich/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${IMMICH_DB_NAME} -U ${IMMICH_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Transmission (BitTorrent) ---
  transmission:
    image: linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      USER: ${TRANSMISSION_USER}
      PASS: ${TRANSMISSION_PASSWORD}
      PEERPORT: 51413
      HOST_WHITELIST: "127.0.0.1,*.lan,*.local,*.localhost,share.${DOMAIN}"
      WHITELIST: "127.0.0.1,172.*.*.*"
    volumes:
      - ${SERVICES_DATA_DIR}/transmission/config:/config
      - ${SERVICES_DATA_DIR}/transmission/downloads:/downloads
      - ${SERVICES_DATA_DIR}/transmission/watch:/watch
    ports:
      - "51413:51413/tcp"
      - "51413:51413/udp"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transmission.rule=Host(`share.${DOMAIN}`)"
      - "traefik.http.routers.transmission.entrypoints=websecure"
      - "traefik.http.routers.transmission.tls.certresolver=letsencrypt"
      - "traefik.http.services.transmission.loadbalancer.server.port=9091"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "--max-time", "5", "http://localhost:9091/transmission/web/"]
      interval: 30s
      timeout: 5s
      retries: 3

# =============================================================================
# Phase 5 — Observability
# =============================================================================

  # --- Uptime Kuma ---
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    dns:
      - ${PI_LAN_IP}
    volumes:
      - ${SERVICES_DATA_DIR}/uptime-kuma:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`services.${DOMAIN}`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  # --- SearXNG (private metasearch) ---
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./configs/searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: https://search.${DOMAIN}/
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.${DOMAIN}`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.tls.certresolver=letsencrypt"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"

  # --- Netdata ---
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/host/etc/os-release:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netdata.rule=Host(`system.${DOMAIN}`)"
      - "traefik.http.routers.netdata.entrypoints=websecure"
      - "traefik.http.routers.netdata.tls.certresolver=letsencrypt"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"
